<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>宝贝报备</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ff6a88 100%);
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 420px; margin: 0 auto; }
  .header {
    text-align: center;
    color: #fff;
    padding: 28px 0 18px;
  }
  .header .icon { font-size: 48px; margin-bottom: 8px; }
  .header h1 { font-size: 24px; margin-bottom: 4px; letter-spacing: 1px; }
  .header p { opacity: 0.85; font-size: 13px; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px 18px;
    box-shadow: 0 8px 32px rgba(245, 87, 108, 0.25);
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: #f5576c;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    margin-bottom: 5px;
  }
  .form-group label .required { color: #f5576c; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #fce4ec;
    border-radius: 12px;
    font-size: 15px;
    color: #333;
    background: #fff5f7;
    transition: all 0.2s;
    -webkit-appearance: none;
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none;
    border-color: #f5576c;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(245,87,108,0.1);
  }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .status-cards {
    display: flex;
    gap: 8px;
  }
  .status-card {
    flex: 1;
    text-align: center;
  }
  .status-card input { display: none; }
  .status-card label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 6px;
    border: 2px solid #fce4ec;
    border-radius: 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    background: #fff5f7;
    color: #999;
    font-weight: 500;
  }
  .status-card .emoji { font-size: 28px; }
  .status-card.safe input:checked + label { border-color: #4caf50; background: #e8f5e9; color: #4caf50; }
  .status-card.warn input:checked + label { border-color: #ff9800; background: #fff3e0; color: #ff9800; }
  .status-card.danger input:checked + label { border-color: #f44336; background: #ffebee; color: #f44336; }
  .quick-location {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .quick-location button {
    padding: 7px 12px;
    border: 1.5px solid #fce4ec;
    background: #fff;
    border-radius: 20px;
    color: #f5576c;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-location button:active { background: #fce4ec; transform: scale(0.95); }
  .sweet-msg-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
  }
  .toggle-switch input { display: none; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #ddd;
    border-radius: 24px;
    transition: 0.3s;
  }
  .toggle-slider:before {
    content: "";
    position: absolute;
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  input:checked + .toggle-slider { background: #f5576c; }
  input:checked + .toggle-slider:before { transform: translateX(20px); }
  .btn-submit {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(245, 87, 108, 0.4);
    letter-spacing: 1px;
  }
  .btn-submit:active { transform: scale(0.96); }
  .btn-submit:disabled { opacity: 0.6; transform: none; }
  .history-list { max-height: 280px; overflow-y: auto; }
  .history-item {
    padding: 12px 14px;
    border-bottom: 1px solid #fce4ec;
    font-size: 13px;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item .time { color: #bbb; font-size: 11px; margin-bottom: 3px; }
  .history-item .content { color: #555; }
  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .status-safe { background: #e8f5e9; color: #4caf50; }
  .status-warn { background: #fff3e0; color: #ff9800; }
  .status-danger { background: #ffebee; color: #f44336; }
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    text-align: center;
    max-width: 90%;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #4caf50; }
  .toast.error { background: #f44336; }
  .empty-state { text-align: center; color: #ccc; padding: 30px 0; font-size: 13px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
  <div class="header">
    <div class="icon">💖</div>
    <h1>宝贝报备</h1>
    <p>不管去哪都要让我知道，爱你</p>
  </div>

  <div class="card">
    <div class="card-title">📍 在哪呢宝贝</div>

    <div class="form-group">
      <label>当前地点 <span class="required">*</span></label>
      <input type="text" id="location" placeholder="如：曼谷暹罗百丽宫、普吉芭东海滩" maxlength="100">
    </div>
    <div class="quick-location">
      <button onclick="setLoc('曼谷酒店')">🏨 酒店</button>
      <button onclick="setLoc('曼谷餐厅')">🍽 餐厅</button>
      <button onclick="setLoc('曼谷商场')">🛍 商场</button>
      <button onclick="setLoc('曼谷景点')">📸 景点</button>
      <button onclick="setLoc('曼谷按摩店')">💆 按摩</button>
      <button onclick="setLoc('普吉海滩')">🏖 海滩</button>
      <button onclick="setLoc('清迈古城')">🏯 古城</button>
      <button onclick="setLoc('机场')">✈ 机场</button>
    </div>

    <div class="form-group" style="margin-top:14px;">
      <label>我的状态 <span class="required">*</span></label>
      <div class="status-cards">
        <div class="status-card safe">
          <input type="radio" name="status" id="safe" value="安全" checked>
          <label for="safe"><span class="emoji">😊</span>很安全</label>
        </div>
        <div class="status-card warn">
          <input type="radio" name="status" id="warn" value="需留意">
          <label for="warn"><span class="emoji">🤔</span>需留意</label>
        </div>
        <div class="status-card danger">
          <input type="radio" name="status" id="danger" value="求助">
          <label for="danger"><span class="emoji">🆘</span>需要你</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>想说点什么</label>
      <textarea id="remark" placeholder="比如：刚吃完芒果糯米饭超好吃～想你" maxlength="300"></textarea>
      <div class="sweet-msg-toggle">
        <label class="toggle-switch">
          <input type="checkbox" id="autoSweet" checked>
          <span class="toggle-slider"></span>
        </label>
        <span style="font-size:12px;color:#999;">自动附加甜蜜话</span>
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitReport()">💌 告诉老公</button>
  </div>

  <div class="card">
    <div class="card-title">📋 报备记录</div>
    <div class="history-list" id="historyList">
      <div class="empty-state">还没有报备过哦</div>
    </div>
  </div>
</div>

<script>
const TOKEN = 'fd7f9d489507418bab7910cbac0c02ce';
const STORAGE_KEY = 'thai_checkin_history';

const sweetMsgs = [
  '爱你哟～mua！💋',
  '想你了，抱抱～',
  '老公最好了，亲一口！',
  '等我回去好好补偿你～',
  '你是我的小太阳☀',
  '每分每秒都在想你～',
  '没有你的旅行总觉得少了什么',
  '回来给你带礼物哦，想你',
  '今天也是爱老公的一天！',
  '想钻进你怀里，么么哒'
];

function setLoc(place) {
  document.getElementById('location').value = place;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast', 2200);
}

function getStatusBadge(status) {
  if (status === '安全') return '<span class="status-badge status-safe">😊 安全</span>';
  if (status === '需留意') return '<span class="status-badge status-warn">🤔 需留意</span>';
  return '<span class="status-badge status-danger">🆘 求助</span>';
}

function loadHistory() {
  const raw = localStorage.getItem(STORAGE_KEY);
  const list = raw ? JSON.parse(raw) : [];
  renderHistory(list);
}

function renderHistory(list) {
  const c = document.getElementById('historyList');
  if (list.length === 0) {
    c.innerHTML = '<div class="empty-state">还没有报备过哦</div>';
    return;
  }
  c.innerHTML = list.slice().reverse().map(i => `
    <div class="history-item">
      <div class="time">${i.time}</div>
      <div class="content">${getStatusBadge(i.status)} ${i.location}${i.remark ? ' · ' + i.remark : ''}</div>
    </div>
  `).join('');
}

async function submitReport() {
  const location = document.getElementById('location').value.trim();
  const status = document.querySelector('input[name="status"]:checked')?.value;
  let remark = document.getElementById('remark').value.trim();
  const autoSweet = document.getElementById('autoSweet').checked;

  if (!location) { showToast('宝贝，告诉我在哪呀～', 'error'); return; }
  if (!status) { showToast('选一下你的状态嘛', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '发送中...';

  const sweet = autoSweet ? sweetMsgs[Math.floor(Math.random() * sweetMsgs.length)] : '';
  const fullRemark = [remark, sweet].filter(Boolean).join(' | ');

  const now = new Date();
  const bkTime = now.toLocaleString('zh-CN', { timeZone: 'Asia/Bangkok', hour12: false });
  const bjTime = now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });

  const statusIcon = status === '求助' ? '🔴' : status === '需留意' ? '🟡' : '🟢';
  const title = status === '求助' ? '【紧急】宝贝需要你！' : `宝贝报备 · ${location}`;

  const content = `
    <div style="padding:12px;font-size:15px;font-family:-apple-system,sans-serif;">
      <div style="font-size:20px;font-weight:bold;margin-bottom:14px;color:#f5576c;">
        ${statusIcon} ${status === '求助' ? '宝贝需要你！' : status === '需留意' ? '宝贝有点担心' : '宝贝很安全'}
      </div>
      <div style="background:#fff5f7;border-radius:10px;padding:14px;margin-bottom:10px;">
        <p style="margin:0 0 6px;"><b>📍 地点：</b>${escapeHtml(location)}</p>
        <p style="margin:0 0 6px;"><b>💭 状态：</b>${status}</p>
        ${fullRemark ? `<p style="margin:0;"><b>💬 她说：</b>${escapeHtml(fullRemark)}</p>` : ''}
      </div>
      <p style="color:#bbb;font-size:11px;margin:10px 0 0;">🕐 曼谷 ${bkTime} | 北京 ${bjTime}</p>
    </div>
  `;

  try {
    const resp = await fetch('https://www.pushplus.plus/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, title, content, template: 'html' })
    });
    const result = await resp.json();
    if (result.code === 200) {
      showToast('报备成功！老公已收到 💕', 'success');
      saveHistory(location, status, remark, bkTime);
      document.getElementById('remark').value = '';
    } else {
      showToast('发送失败: ' + (result.msg || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('网络出问题了，重试一下～', 'error');
  }

  btn.disabled = false;
  btn.textContent = '💌 告诉老公';
}

function saveHistory(location, status, remark, time) {
  const raw = localStorage.getItem(STORAGE_KEY);
  const list = raw ? JSON.parse(raw) : [];
  list.push({ location, status, remark, time });
  if (list.length > 50) list.shift();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  renderHistory(list);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

loadHistory();
</script>
</body>
</html>
